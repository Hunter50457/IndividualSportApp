plugins {
    id 'com.android.application'
}

android {
    namespace 'com.example.individualsportapp'
    compileSdk 33

    defaultConfig {
        applicationId 'com.example.individualsportapp'
        minSdk 23
        targetSdk 33
        versionCode 1
        versionName '1.0'
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}
